<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRB Session Packager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h1 class="card-title mb-0">IRB Session Packager</h1>
                    </div>
                    <div class="card-body">
                        <p class="lead">Create comprehensive IRB session packages with SOPs, documentation, and BIDS templates.</p>

                        <div class="row">
                            <div class="col-md-6">
                                <h3>Create New Package</h3>
                                <form id="createPackageForm">
                                    <div class="form-group">
                                        <label for="sessionId">Session ID:</label>
                                        <input type="text" class="form-control" id="sessionId" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="studyName">Study Name:</label>
                                        <input type="text" class="form-control" id="studyName" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="principalInvestigator">Principal Investigator:</label>
                                        <input type="text" class="form-control" id="principalInvestigator" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="modality">Modality:</label>
                                        <select class="form-control" id="modality" required>
                                            <option value="fMRI">fMRI</option>
                                            <option value="EEG">EEG</option>
                                            <option value="TMS">TMS</option>
                                            <option value="MRI">MRI</option>
                                            <option value="PET">PET</option>
                                            <option value="MEG">MEG</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="sessionType">Session Type:</label>
                                        <select class="form-control" id="sessionType" required>
                                            <option value="task_based">Task Based</option>
                                            <option value="resting_state">Resting State</option>
                                            <option value="stimulation">Stimulation</option>
                                            <option value="clinical">Clinical</option>
                                            <option value="pilot">Pilot</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="population">Participant Population:</label>
                                        <select class="form-control" id="population" required>
                                            <option value="healthy_adults">Healthy Adults</option>
                                            <option value="clinical_population">Clinical Population</option>
                                            <option value="children">Children</option>
                                            <option value="elderly">Elderly</option>
                                            <option value="pregnant">Pregnant</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="riskLevel">Risk Level:</label>
                                        <select class="form-control" id="riskLevel" required>
                                            <option value="minimal">Minimal</option>
                                            <option value="low">Low</option>
                                            <option value="moderate">Moderate</option>
                                            <option value="high">High</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="duration">Duration (minutes):</label>
                                        <input type="number" class="form-control" id="duration" min="1" max="480" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="participants">Expected Participants:</label>
                                        <input type="number" class="form-control" id="participants" min="1" required>
                                    </div>
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="includeSop" checked>
                                        <label class="form-check-label" for="includeSop">Include SOP</label>
                                    </div>
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="includeIrb" checked>
                                        <label class="form-check-label" for="includeIrb">Include IRB Documents</label>
                                    </div>
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="includeBids" checked>
                                        <label class="form-check-label" for="includeBids">Include BIDS Templates</label>
                                    </div>
                                    <button type="submit" class="btn btn-primary mt-3">Create Package</button>
                                </form>
                            </div>
                            <div class="col-md-6">
                                <h3>Existing Packages</h3>
                                <div id="packagesList">
                                    <button class="btn btn-secondary" onclick="loadPackages()">Load Packages</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '/api';

        document.getElementById('createPackageForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                session_metadata: {
                    session_id: document.getElementById('sessionId').value,
                    study_name: document.getElementById('studyName').value,
                    principal_investigator: document.getElementById('principalInvestigator').value,
                    modality: document.getElementById('modality').value,
                    session_type: document.getElementById('sessionType').value,
                    participant_population: document.getElementById('population').value,
                    risk_level: document.getElementById('riskLevel').value,
                    duration_minutes: parseInt(document.getElementById('duration').value),
                    expected_participants: parseInt(document.getElementById('participants').value)
                },
                include_sop: document.getElementById('includeSop').checked,
                include_irb: document.getElementById('includeIrb').checked,
                include_bids: document.getElementById('includeBids').checked
            };

            try {
                const response = await fetch(`${API_BASE}/create-package`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (response.ok) {
                    alert(`Package created successfully! Session ID: ${result.session_id}`);
                    loadPackages(); // Refresh the packages list
                } else {
                    alert(`Error: ${result.detail || 'Unknown error'}`);
                }
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        });

        async function loadPackages() {
            try {
                const response = await fetch(`${API_BASE}/packages`);
                const result = await response.json();

                const packagesList = document.getElementById('packagesList');
                packagesList.innerHTML = '<h4>Saved Packages</h4>';

                if (result.packages.length === 0) {
                    packagesList.innerHTML += '<p>No packages found.</p>';
                } else {
                    result.packages.forEach(pkg => {
                        const packageDiv = document.createElement('div');
                        packageDiv.className = 'card mt-2';
                        packageDiv.innerHTML = `
                            <div class="card-body">
                                <h5 class="card-title">${pkg.session_id}</h5>
                                <p class="card-text">Created: ${new Date(pkg.created_at).toLocaleString()}</p>
                                <button class="btn btn-sm btn-info" onclick="viewPackage('${pkg.session_id}')">View</button>
                                <button class="btn btn-sm btn-success" onclick="exportPackage('${pkg.session_id}')">Export</button>
                                <button class="btn btn-sm btn-danger" onclick="deletePackage('${pkg.session_id}')">Delete</button>
                            </div>
                        `;
                        packagesList.appendChild(packageDiv);
                    });
                }
            } catch (error) {
                alert(`Error loading packages: ${error.message}`);
            }
        }

        async function viewPackage(sessionId) {
            try {
                const response = await fetch(`${API_BASE}/package-summary/${sessionId}`);
                const summary = await response.json();

                alert(`Package Summary for ${sessionId}:
Study: ${summary.study_name}
Modality: ${summary.modality}
Duration: ${summary.total_duration} minutes
SOP Documents: ${summary.document_counts.sop_documents}
IRB Documents: ${summary.document_counts.irb_documents}
BIDS Events: ${summary.document_counts.bids_events}`);
            } catch (error) {
                alert(`Error viewing package: ${error.message}`);
            }
        }

        async function exportPackage(sessionId) {
            try {
                const response = await fetch(`${API_BASE}/export-package`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        formats: ['pdf', 'zip']
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    alert(`Package exported successfully!
Files: ${Object.keys(result.exported_files).join(', ')}`);
                } else {
                    alert(`Export error: ${result.detail || 'Unknown error'}`);
                }
            } catch (error) {
                alert(`Error exporting package: ${error.message}`);
            }
        }

        async function deletePackage(sessionId) {
            if (!confirm(`Are you sure you want to delete package ${sessionId}?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/package/${sessionId}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (response.ok) {
                    alert(result.message);
                    loadPackages(); // Refresh the list
                } else {
                    alert(`Delete error: ${result.detail || 'Unknown error'}`);
                }
            } catch (error) {
                alert(`Error deleting package: ${error.message}`);
            }
        }
    </script>
</body>
</html>
